<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Recupera el acceso a tu cuenta de barbero.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../../assets/images/Logoplatinum.JPG" type="image/png">
  <link rel="shortcut icon" href="../../assets/images/Logoplatinum.JPG" type="image/png">
  <link rel="stylesheet" href="../../css/admin/password_recovery.css">
  <title>Barbería Platinum | Recuperar contraseña</title>
</head>

<body>
  <main class="login-cont">
    <form class="form-cont" id="forgotPasswordForm">
      <img src="../../assets/images/barberadmin.png" alt="Logo" class="logo">
      <h1>¿Olvidaste tu contraseña?</h1>
      <p>Escribe tu correo y te enviaremos los pasos para continuar.</p>

      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" required placeholder="Tu correo electrónico" autocomplete="email">
      </div>

      <button type="submit">Enviar instrucciones</button>

      <div class="extra-options">
        <a href="auth_admin.html" class="back-link">Volver al inicio de sesión</a>
      </div>

      <p class="form-message" id="formMessage" aria-live="polite"></p>
    </form>
  </main>
  <script src="../../js/config.js"></script>
  <script src="../../js/admin/forgot_password.js"></script>
</body>

</html>
