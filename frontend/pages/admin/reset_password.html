<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Restablece la contraseña de tu cuenta de barbero.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../../assets/images/Logoplatinum.JPG" type="image/png">
  <link rel="shortcut icon" href="../../assets/images/Logoplatinum.JPG" type="image/png">
  <link rel="stylesheet" href="../../css/admin/password_recovery.css">
  <title>Barbería Platinum | Restablecer contraseña</title>
</head>

<body>
  <main class="login-cont">
    <form class="form-cont" id="resetPasswordForm">
      <img src="../../assets/images/barberadmin.png" alt="Logo" class="logo">
      <h1>Restablece tu contraseña</h1>
      <p>Define una nueva contraseña para volver a entrar al panel.</p>

      <input type="hidden" id="token" name="token">

      <div class="field">
        <label for="password">Nueva contraseña</label>
        <input type="password" id="password" name="password" required minlength="8" placeholder="Nueva contraseña"
          autocomplete="new-password">
        <p class="helper-text">Debe tener al menos 8 caracteres.</p>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirmar contraseña</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8"
          placeholder="Confirma tu contraseña" autocomplete="new-password">
      </div>

      <div class="password-rules">
        <ul>
          <li>Usa una contraseña que no hayas reutilizado.</li>
          <li>Combina letras y números si puedes.</li>
        </ul>
      </div>

      <button type="submit">Cambiar contraseña</button>

      <div class="extra-options">
        <a href="auth_admin.html" class="back-link">Volver al inicio de sesión</a>
      </div>

      <p class="form-message" id="formMessage" aria-live="polite"></p>
    </form>
  </main>
  <script src="../../js/config.js"></script>
  <script src="../../js/admin/reset_password.js"></script>
</body>

</html>
