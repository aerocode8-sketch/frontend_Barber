<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Valida el código enviado a tu correo para restablecer el acceso.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../../assets/images/favicon.png" type="image/png">
  <link rel="shortcut icon" href="../../assets/images/favicon.png" type="image/png">
  <link rel="stylesheet" href="../../css/admin/password_recovery.css">
  <title>Barbería Platinum | Validar código</title>
</head>

<body>
  <main class="login-cont">
    <form class="form-cont" id="verifyCodeForm">
      <img src="../../assets/images/barberadmin.png" alt="Logo" class="logo">
      <h1>Ingresa el código</h1>
      <p>Escribe el código que te enviamos al correo para continuar con el cambio de contraseña.</p>

      <div class="field">
        <label for="code">Código de verificación</label>
        <input type="text" id="code" name="code" required inputmode="numeric" minlength="6" maxlength="6"
          placeholder="000000" autocomplete="one-time-code">
        <p class="helper-text">Ingresa el código de 6 dígitos que te enviamos.</p>
      </div>

      <button type="submit">Validar código</button>

      <div class="extra-options">
        <a href="forgot_password.html" class="back-link">Reenviar código</a>
        <a href="auth_admin.html" class="back-link">Volver al inicio de sesión</a>
      </div>

      <p class="form-message" id="formMessage" aria-live="polite"></p>
    </form>
  </main>
  <script src="../../js/config.js"></script>
  <script src="../../js/admin/verify_code.js"></script>
</body>

</html>
