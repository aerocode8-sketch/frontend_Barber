<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Regístrate como barbero.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="../../assets/images/favicon.png" type="image/png">
    <link rel="shortcut icon" href="../../assets/images/favicon.png" type="image/png">
    <title>Barbería Platinum | Registro Barbero</title>
    <link rel="stylesheet" href="../../css/admin/register_admin.css">
</head>

<body class="register-page">

    <!-- HEADER -->
    <header class="auth-header">

        <a href="../../index.html" class="brand">Barbería Platinum</a>

        <nav class="auth-nav" aria-label="Navegación de acceso">
            <a href="../../index.html">Volver al inicio</a>
        </nav>

    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main>
        <section class="register-container">
            <form id="formBarbero">
                <h1>Registro de barbero</h1>

                <!-- Contenedor de errores general -->
                <div id="generalError" class="general-error" style="display: none;"></div>

                <!-- Nombre -->
                <div class="form-group">
                    <label for="nombre">Nombres*</label>
                    <input type="text" id="nombre" name="nombre" autocomplete="given-name" required minlength="2"
                        pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+" placeholder="Tu nombre">
                    <div id="error-nombre" class="form-error"></div>
                </div>

                <!-- Apellido -->
                <div class="form-group">
                    <label for="apellido">Apellidos*</label>
                    <input type="text" id="apellido" name="apellido" autocomplete="family-name" required minlength="2"
                        pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+" placeholder="Tu apellido">
                    <div id="error-apellido" class="form-error"></div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Correo electrónico*</label>
                    <input type="email" id="email" name="email" autocomplete="email" required
                        placeholder="Tu correo electrónico">
                    <div id="error-email" class="form-error"></div>
                </div>

                <!-- Teléfono -->
                <div class="form-group">
                    <label for="telefono">Número de Teléfono*</label>
                    <input type="tel" id="telefono" name="telefono" inputmode="numeric" autocomplete="tel" required
                        placeholder="Tu número de teléfono">
                    <div id="error-telefono" class="form-error"></div>
                </div>

                <!-- Contraseña -->
                <div class="form-group">
                    <label for="password">Contraseña*</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" autocomplete="new-password" required
                            minlength="8" placeholder="Tu contraseña">
                        <button type="button" class="password-toggle" data-target="password"
                            aria-label="Mostrar/Ocultar contraseña">🔒</button>
                    </div>
                    <div id="error-password" class="form-error"></div>
                </div>

                <!-- Confirmar contraseña -->
                <div class="form-group">
                    <label for="confirmpassword">Confirmar Contraseña*</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmpassword" name="confirmpassword" autocomplete="new-password"
                            required minlength="8" placeholder="Confirma tu contraseña">
                        <button type="button" class="password-toggle" data-target="confirmpassword"
                            aria-label="Mostrar/Ocultar contraseña">🔒</button>
                    </div>
                    <div id="error-confirmpassword" class="form-error"></div>
                </div>

                <hr>

                <!-- Botones -->
                <div class="form-actions">
                    <button type="submit">👤 Crear Cuenta</button>
                    <a href="auth_admin.html">¿Ya tienes cuenta? Inicia sesión aquí</a>
                </div>
            </form>
        </section>
    </main>
    <script src="../../js/config.js"></script>
    <script src="../../js/admin/register_admin.js"></script>
</body>

</html>
